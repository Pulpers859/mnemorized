services:
  - type: web
    name: mnemorized
    runtime: python
    pythonVersion: "3.12.3"
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_TIMEOUT_SECONDS
        value: "180"
      - key: ANTHROPIC_MAX_TOKENS
        value: "8192"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-pro-image
      - key: GEMINI_TEXT_MODEL
        value: gemini-3.1-pro-preview
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3-pro-image
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_EMBEDDING_DIMENSIONS
        value: "1536"
      - key: CORS_ORIGINS
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: ADMIN_EMAILS
        sync: false
      - key: BILLING_MODE
        value: beta
